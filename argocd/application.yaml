apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ticketing
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/sxk34/soldesk.git
    targetRevision: FINAL
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ticketing
  # sqs-access-sa 의 IRSA role arn 은 배포자마다 계정 ID 가 달라야 하므로
  # git 에는 PLACEHOLDER_ACCOUNT_ID 로 남기고 setup-all.sh [9.5/14] 가 로컬에서 치환한다.
  # ArgoCD 가 이 annotation 을 revert 하지 않도록 무시 목록에 명시.
  # JSON Pointer 에서 "/" 는 "~1" 로 escape.
  ignoreDifferences:
    - group: ""
      kind: ServiceAccount
      name: sqs-access-sa
      namespace: ticketing
      jsonPointers:
        - /metadata/annotations/eks.amazonaws.com~1role-arn
  syncPolicy:
    automated:
      prune: true
      selfHeal: true  # git을 단일 진실로 강제 — 수동 kubectl 변경은 수 초 내 원복
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
