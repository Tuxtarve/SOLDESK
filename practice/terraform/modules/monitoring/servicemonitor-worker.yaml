apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: worker-svc-monitor
  namespace: monitoring
  labels:
    release: kube-prometheus-stack

spec:
  selector:
    matchLabels:
      app: worker-svc

  namespaceSelector:
    matchNames:
      - ticketing-was

  endpoints:
    - port: http
      path: /metrics
      interval: 15s