# 1. 프로메테우스 설정
prometheus:
  prometheusSpec:
    retention: 3d          # 데이터 보관 3일
    scrapeInterval: 60s  # 수집 주기 60초 (CPU 절약)
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "200m"
        memory: "512Mi"

# 2. 알러트매니저 (슬랙 알람 설정 추가)
alertmanager:
  enabled: false  # 슬랙 알람을 위해 켠단다
  config:
    global:
      # 여기에 슬랙 웹훅 URL을 나중에 넣으렴!
      #slack_api_url: "YOUR_SLACK_WEBHOOK_URL"
    route:
      receiver: 'slack-notifications'
      group_by: [alertname]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 3h
    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - channel: '#monitoring'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] EKS Alert'
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"

# 3. 그라파나 설정
grafana:
  adminPassword: "soldesk1."
  service:
    type: LoadBalancer
  
  # 사이드카 활성화 (우리가 만든 ConfigMap 대시보드와 데이터소스를 자동으로 읽어온다)
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"

  # Loki 데이터 소스를 직접 명시 (Loki-stack 구조에 최적화)
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
      isDefault: false
      jsonData:
        maxLines: 1000