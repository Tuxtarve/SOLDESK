apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# 루트에 namespace 를 두면 kube-system PDB 등까지 ticketing 으로 덮어쓰므로, ticketing 리소스는 매니페스트에 namespace 명시.

resources:
  - namespace.yaml
  - priorityclass-ticketing.yaml
  - configmap.yaml
  - sqs-service-account.yaml
  - pdb-user-facing.yaml
  - read-api/deployment.yaml
  - read-api/deployment-burst.yaml
  - read-api/service.yaml
  - read-api/hpa.yaml
  - write-api/deployment.yaml
  - write-api/deployment-burst.yaml
  - write-api/service.yaml
  - write-api/hpa.yaml
  - worker-svc/deployment.yaml
  - worker-svc/deployment-burst.yaml
  - worker-svc/service.yaml
  - ingress.yaml
  - keda
  - kube-system

images:
  - name: ticketing/ticketing-was
    # setup-all.sh [9.5/14] 가 PLACEHOLDER_ACCOUNT_ID 를 팀원 계정으로 치환.
    newName: PLACEHOLDER_ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/ticketing/ticketing-was
    newTag: latest
  - name: ticketing/worker-svc
    newName: PLACEHOLDER_ACCOUNT_ID.dkr.ecr.ap-northeast-2.amazonaws.com/ticketing/worker-svc
    newTag: latest
