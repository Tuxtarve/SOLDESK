apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketing-ingress
  namespace: ticketing
  annotations:
    # internal ALB -- VPC 내부에서만 접근 가능. API Gateway VPC Link만이 호출 가능
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /api/read/health
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          # Read API
          - path: /api/read
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
          # Write API
          - path: /api/write
            pathType: Prefix
            backend:
              service:
                name: write-api
                port:
                  number: 5001
          # Health check
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
          # Catch-all
          - path: /
            pathType: Prefix
            backend:
              service:
                name: read-api
                port:
                  number: 5000
