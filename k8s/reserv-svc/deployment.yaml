apiVersion: apps/v1
kind: Deployment
metadata:
  name: reserv-svc
  namespace: ticketing-was
  labels:
    app: reserv-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reserv-svc
  template:
    metadata:
      labels:
        app: reserv-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: reserv-svc
          image: 032098305878.dkr.ecr.ap-northeast-2.amazonaws.com/reserv-svc:latest
          imagePullPolicy: Always

          ports:
            - containerPort: 3001

          env:
            - name: AWS_REGION
              value: "ap-northeast-2"

            # 🔥 여기 추가 (핵심)
            - name: DB_HOST
              value: "<RDS writer endpoint>"
            - name: DB_USER
              value: "admin"
            - name: DB_PASSWORD
              value: "비밀번호"
            - name: DB_NAME
              value: "ticketing"

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"