apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: read-api-hpa
  namespace: ticketing
  labels:
    app: read-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: read-api
  minReplicas: 1
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 180
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
