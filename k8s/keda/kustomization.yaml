# KEDA operator 는 terraform helm_release(keda_helm.tf) 로 설치. post_apply_k8s_bootstrap.sh 가 CRD 대기 후 이 디렉터리를 kubectl apply.
# ScaledObject 는 기본 paused(자동 스케일 끔).
#
# 수동만 할 때: terraform 없이 KEDA helm 설치 후
#   ./k8s/scripts/patch-sqs-access-sa-irsa.sh
#   kubectl apply -k k8s/keda
#
# 자동 스케일 켜기: kubectl annotate scaledobject worker-svc-sqs -n ticketing autoscaling.keda.sh/paused-
# 다시 끄기: kubectl annotate scaledobject worker-svc-sqs -n ticketing autoscaling.keda.sh/paused=true --overwrite
#
# KEDA 설치 끄기: terraform 변수 install_keda = false
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ticketing

resources:
  - triggerauthentication-worker-sqs.yaml
  - scaledobject-worker-svc.yaml
