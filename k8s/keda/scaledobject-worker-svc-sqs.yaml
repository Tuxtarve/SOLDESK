apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-svc-sqs
  namespace: ticketing
  labels:
    app: worker-svc
spec:
  scaleTargetRef:
    name: worker-svc
  pollingInterval: 5
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 20
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 180
          policies:
            - type: Percent
              value: 50
              periodSeconds: 60
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 4
              periodSeconds: 30
          selectPolicy: Max
  triggers:
    # SQS 큐 길이 기반 — 예매 트래픽 본 신호
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-worker-sqs-aws
      metadata:
        awsRegion: ap-northeast-2
        queueURLFromEnv: SQS_QUEUE_URL
        queueLength: "2"
        activationQueueLength: "1"
        scaleOnInFlight: "true"
    # CPU 기반 — SQS 메시지 없이 CPU 만 튀는 경우 대비 (백업 신호)
    - type: cpu
      metricType: Utilization
      metadata:
        value: "60"
