apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-svc-sqs
  labels:
    app: worker-svc
  annotations:
    # 기본은 스케일 "비활성"(테스트 시 사용자가 paused-로 해제).
    autoscaling.keda.sh/paused: "true"
spec:
  scaleTargetRef:
    name: worker-svc
  pollingInterval: 10
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-worker-sqs-aws
      metadata:
        awsRegion: ap-northeast-2
        queueURLFromEnv: SQS_QUEUE_URL
        queueLength: "3"
