apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-svc-ui-sqs
  labels:
    app: worker-svc-ui
spec:
  scaleTargetRef:
    name: worker-svc-ui
  pollingInterval: 10
  cooldownPeriod: 30
  minReplicaCount: 1
  maxReplicaCount: 5
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-worker-sqs-aws
      metadata:
        awsRegion: ap-northeast-2
        queueURLFromEnv: SQS_QUEUE_URL
        queueLength: "3"
