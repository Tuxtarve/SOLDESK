# 큐에 쌓인(가시+인플라이트) 메시지 수에 따라 worker-svc 레플리카 조정.
# 공식: ceil(메시지수 / queueLength) (min/max 클램프).
# awsRegion 은 부트스트랩 시 terraform AWS_REGION 으로 치환됩니다.
# paused: 자동 스케일 끔. 켤 때: kubectl annotate scaledobject worker-svc-sqs -n ticketing autoscaling.keda.sh/paused-
# 이 파일을 다시 kubectl apply 하면 metadata.annotations.paused 가 복구되므로, 적용 후 pause 해제를 다시 해야 함.
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: worker-svc-sqs
  labels:
    app: worker-svc
  annotations:
    autoscaling.keda.sh/paused: "true"
spec:
  scaleTargetRef:
    name: worker-svc
  # 시연·적체 감지: 너무 길면 큐가 비는 순간을 놓침
  pollingInterval: 5
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 15
  triggers:
    - type: aws-sqs-queue
      authenticationRef:
        name: keda-worker-sqs-aws
      metadata:
        queueURLFromEnv: SQS_QUEUE_URL
        # 작을수록 같은 메시지 수에서 레플리카 목표가 커짐 (ceil(메시지÷queueLength))
        queueLength: "5"
        activationQueueLength: "1"
        awsRegion: ap-northeast-2
        # ^ post_apply_k8s_bootstrap.sh 가 AWS_REGION 으로 sed 치환
        scaleOnInFlight: "true"
