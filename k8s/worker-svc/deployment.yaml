apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-svc
  namespace: ticketing
  labels:
    app: worker-svc
spec:
  # replicas는 KEDA ScaledObject(worker-svc-sqs-scaler)가 관리한다
  # kubectl apply 시 KEDA가 생성한 HPA의 desired replicas와 충돌하지 않도록
  # 여기서는 명시하지 않는다 (kubectl 기본 1로 생성 후 KEDA가 즉시 인수)
  selector:
    matchLabels:
      app: worker-svc
  template:
    metadata:
      labels:
        app: worker-svc
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: sqs-access-sa
      containers:
        - name: worker-svc
          image: ticketing/worker-svc:latest
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: ticketing-config
            - secretRef:
                name: ticketing-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
